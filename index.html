<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Voli Reward Reali</title>

<style>
body{font-family:sans-serif;background:#f8fafc;text-align:center}
.container{max-width:700px;margin:40px auto}
.card{background:white;padding:20px;margin:15px;border-radius:10px;text-align:left}
</style>

</head>

<body>

<div class="container">

<h1>✈️ Cerca voli Flying Blue reali</h1>

<input id="from" placeholder="MXP">
<input id="to" placeholder="JFK">
<input id="date" type="date">

<br><br>

<button onclick="search()">Cerca</button>

<div id="results"></div>

</div>

<script>

function search(){

const from=document.getElementById("from").value
const to=document.getElementById("to").value
const date=document.getElementById("date").value

fetch(`/api/flyingblue?from=${from}&to=${to}&date=${date}`)
.then(res=>res.json())
.then(data=>{

let html=""

if(!data.results){
html="Nessun risultato"
}else{

data.results.forEach(r=>{
html+=`<div class="card">💳 ${r}</div>`
})

}

document.getElementById("results").innerHTML=html

})

}

</script>

</body>
</html>
