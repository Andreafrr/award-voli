<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Voli Reward Reali</title>

<style>
body{font-family:sans-serif;background:#f8fafc;text-align:center}
.container{max-width:700px;margin:40px auto}
.card{background:white;padding:20px;margin:15px;border-radius:10px;text-align:left}
</style>

</head>

<body>

<div class="container">

<h1>✈️ Voli premio trovati</h1>

<button onclick="load()">Carica opportunità</button>

<div id="results"></div>

</div>

<script>

function load(){

fetch("/api/get-awards")
.then(res=>res.json())
.then(data=>{

let html=""

data.slice(-10).reverse().forEach(f=>{

html+=`
<div class="card">

<b>${f.from} → ${f.to}</b><br>
📅 ${f.date}<br>
💳 ${f.points} punti<br>

</div>
`
})

document.getElementById("results").innerHTML=html

})

}

</script>

</body>
</html>
