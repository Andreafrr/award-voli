<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparatore Voli Premio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
margin:0;
text-align:center;
}

.container{
margin:50px auto;
background:white;
padding:30px;
border-radius:16px;
max-width:800px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.card{
background:white;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.05);
text-align:left;
}

.highlight{
border:2px solid gold;
}

.section-title{
margin-top:30px;
font-size:20px;
font-weight:600;
}

.value-bar-container{
background:#e5e7eb;
height:8px;
border-radius:6px;
margin-top:6px;
}

.value-bar{
height:8px;
background:#4f46e5;
border-radius:6px;
}

.timeline{
background:#eef2ff;
padding:15px;
border-radius:10px;
margin-top:20px;
text-align:left;
}

input,select{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎯 Scopri dove i tuoi punti valgono di più</h1>

<!-- PARTENZA -->
<select id="from">
<option value="IT">Italia 🇮🇹 (tutti gli aeroporti)</option>
<option value="MXP">Milano (MXP)</option>
<option value="FCO">Roma (FCO)</option>
<option value="VCE">Venezia (VCE)</option>
<option value="BLQ">Bologna (BLQ)</option>
<option value="NAP">Napoli (NAP)</option>
</select>

<!-- CABINA -->
<select id="cabin">
<option value="all">Tutte le cabine</option>
<option value="Economy">Economy</option>
<option value="Premium Economy">Premium Economy</option>
<option value="Business">Business</option>
<option value="First">First</option>
</select>

<br>

<input id="maxPoints" placeholder="MR disponibili">
<input id="monthlyMR" placeholder="MR/mese">

<br>

<input type="date" id="date">

<br>

<button onclick="searchFlights()">Cerca</button>

<div id="timeline"></div>
<div id="bestRealistic"></div>
<div id="results"></div>

</div>

<script>

function getValueLabel(v){
v=parseFloat(v)
if(v>=2) return "🔥 Ottima redemption"
if(v>=1) return "👍 Buona redemption"
if(v>=0.5) return "⚖️ Valore base"
return "⚠️ Valore basso"
}

function searchFlights(){

const from=document.getElementById("from").value
const cabin=document.getElementById("cabin").value
const maxPoints=document.getElementById("maxPoints").value
const monthlyMR=parseInt(document.getElementById("monthlyMR").value)
const date=document.getElementById("date").value

fetch(`/api/search?from=${from}&maxMR=${maxPoints}&cabin=${cabin}&date=${date}&monthlyMR=${monthlyMR}`)
.then(res=>res.json())
.then(data=>{

let {bookable,almost,future}=data.sections
let all=[...bookable,...almost,...future]

// filtro cabine frontend
if(cabin!=="all"){
bookable=bookable.filter(r=>r.cabin===cabin)
almost=almost.filter(r=>r.cabin===cabin)
future=future.filter(r=>r.cabin===cabin)
all=all.filter(r=>r.cabin===cabin)
}

// TIMELINE
const timelineTrips=all
.filter(r=>r.monthsNeeded!==null)
.sort((a,b)=>a.monthsNeeded-b.monthsNeeded)
.slice(0,5)

let timelineHTML="<div class='timeline'><b>🧭 Il tuo piano viaggio</b><br><br>"

timelineTrips.forEach(r=>{
timelineHTML+=`✈️ ${r.destination}<br>📅 Tra ${r.monthsNeeded} mesi<br><br>`
})

timelineHTML+="</div>"
document.getElementById("timeline").innerHTML=timelineHTML

// BEST
const best=all
.filter(r=>r.monthsNeeded!==null && r.monthsNeeded<=6)
.sort((a,b)=>parseFloat(b.estimatedValue)-parseFloat(a.estimatedValue))[0]

if(best){
document.getElementById("bestRealistic").innerHTML=`
<div class="card highlight">
🎯 <b>Miglior viaggio realistico</b><br><br>
${best.destination} (${best.region})<br>
✈️ Partenza: ${best.from}<br>
💺 ${best.cabin}<br>
📊 ${best.estimatedValue} cent/punto<br>
📅 Tra ${best.monthsNeeded} mesi
</div>
`
}

// VALUE %
const bestValue=Math.max(...all.map(r=>parseFloat(r.estimatedValue||0)))

all.forEach(r=>{
r.valuePercent=bestValue>0
? Math.round((parseFloat(r.estimatedValue)/bestValue)*100)
: 0
})

// RENDER
let html=""

function renderSection(title,list){

if(!list.length) return

html+=`<div class="section-title">${title}</div>`

list.forEach(r=>{

const saving=r.cashAverage
? (parseFloat(r.cashAverage)-r.taxes).toFixed(0)
: 0

html+=`
<div class="card">

<b>${r.destination}</b> (${r.region})<br>
✈️ Partenza: ${r.from}<br>
💺 ${r.cabin}<br><br>

💳 ${r.mrRequired.toLocaleString()} MR<br>

💰 ${r.cashAverage ? `€${r.cashAverage}` : "Prezzo non disponibile"}<br>
💸 Risparmio: €${saving}<br><br>

${r.estimatedValue>0 
? `📊 ${r.estimatedValue} cent/punto`
: "📊 Dati non disponibili"}<br>

${getValueLabel(r.estimatedValue)}<br><br>

📊 ${r.valuePercent}% del valore massimo

<div class="value-bar-container">
<div class="value-bar" style="width:${r.valuePercent}%"></div>
</div><br>

${r.mrMissing>0 
? `⚠️ Ti mancano ${r.mrMissing.toLocaleString()} MR<br>` 
: "✈️ Prenotabile ora<br>"}

${r.monthsNeeded!==null 
? `📅 Tra ${r.monthsNeeded} mesi<br>` 
: ""}

${r.monthsNeeded!==null && r.monthsNeeded<=6 
? `
<input placeholder="Inserisci email" id="email-${r.destination}">
<button onclick="saveAlert('${r.destination}', ${r.monthsNeeded}, '${r.from}', '${r.destinationCode}', '${r.cabin}')">
🔔 Avvisami
</button>
`
:""}

</div>
`
})

}

renderSection("✈️ Prenotabili ora",bookable)
renderSection("⚖️ Raggiungibili a breve",almost)
renderSection("🌍 Obiettivi futuri",future)

document.getElementById("results").innerHTML=html

})

}

function saveAlert(destination, months, origin, destCode, cabin){

const email=document.getElementById(`email-${destination}`).value

if(!email){
alert("Inserisci email")
return
}

fetch("/api/save-trip",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,destination,origin,destCode,cabin})
})

fetch("/api/notify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,destination,months})
})

.then(()=>alert("Perfetto! Ti avviseremo ✈️"))

}

</script>

</body>
</html>
