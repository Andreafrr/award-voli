<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparatore Voli Premio</title>

<style>
body{font-family:sans-serif;background:#f8fafc;text-align:center}
.container{margin:40px auto;max-width:800px}
.card{background:white;padding:20px;margin:15px;border-radius:10px;text-align:left}
.highlight{border:2px solid gold}
.timeline{background:#eef2ff;padding:15px;border-radius:10px;margin:20px}
.notify{margin-top:10px;padding:8px;background:#ecfdf5;border-radius:6px;font-size:14px}
button{margin-top:10px;padding:10px;border:none;background:#4f46e5;color:white;border-radius:6px}
</style>

</head>

<body>

<div class="container">

<h1>🎯 Scopri dove i tuoi punti valgono di più</h1>

<select id="from">
<option value="IT">Italia 🇮🇹</option>
<option value="MXP">Milano</option>
<option value="FCO">Roma</option>
</select>

<select id="cabin">
<option value="Economy">Economy</option>
<option value="Business">Business</option>
</select>

<br>

<input id="maxPoints" placeholder="MR disponibili">
<input id="monthlyMR" placeholder="MR/mese">

<br>

<input type="date" id="date">

<br>

<button onclick="searchFlights()">Cerca</button>

<div id="timeline"></div>
<div id="bestRealistic"></div>
<div id="results"></div>

</div>

<script>

function searchFlights(){

const from=document.getElementById("from").value
const cabin=document.getElementById("cabin").value
const maxPoints=document.getElementById("maxPoints").value
const monthlyMR=parseInt(document.getElementById("monthlyMR").value)
const date=document.getElementById("date").value

fetch(`/api/search?from=${from}&maxMR=${maxPoints}&cabin=${cabin}&date=${date}&monthlyMR=${monthlyMR}`)

.then(res=>res.json())
.then(data=>{

let {bookable,almost,future}=data.sections
let all=[...bookable,...almost,...future]

// ======================
// 🔥 TIMELINE (SOLO TEMPI)
// ======================

const timelineTrips=all
.filter(r=>r.monthsNeeded!==null)
.sort((a,b)=>a.monthsNeeded-b.monthsNeeded)
.slice(0,5)

let timelineHTML="<div class='timeline'><b>🧭 Il tuo piano viaggio</b><br><br>"

timelineTrips.forEach(r=>{

timelineHTML+=`
✈️ ${r.destination}  
📅 Tra ${r.monthsNeeded} mesi<br><br>
`

})

timelineHTML+="</div>"

document.getElementById("timeline").innerHTML=timelineHTML

// ======================
// 🎯 MIGLIOR VIAGGIO
// ======================

const best=all
.filter(r=>r.monthsNeeded!==null && r.monthsNeeded<=6)
.sort((a,b)=>b.estimatedValue-a.estimatedValue)[0]

if(best){

document.getElementById("bestRealistic").innerHTML=`
<div class="card highlight">
🎯 <b>Miglior viaggio realistico</b><br><br>
${best.destination}<br>
💺 ${best.cabin}<br>
📊 ${best.estimatedValue} cent/punto<br>
📅 Tra ${best.monthsNeeded} mesi
</div>
`
}

// ======================
// LISTA NORMALE + NOTIFICA
// ======================

let html=""

function notify(destination, months){

alert(`Ti avviseremo quando potrai prenotare ${destination} tra ${months} mesi ✈️`)

// 👉 qui in futuro collegheremo email / database

}

function render(list,title){

html+=`<h2>${title}</h2>`

list.forEach(r=>{

html+=`
<div class="card">

<b>${r.destination}</b><br>

💺 ${r.cabin}<br>

💳 ${r.mrRequired} MR<br>

📊 ${r.estimatedValue} cent<br>

${r.mrMissing>0?`⚠️ Mancano ${r.mrMissing}`:"✅ Prenotabile ora"}<br>

${r.monthsNeeded?`📅 Tra ${r.monthsNeeded} mesi<br>`:""}

${r.monthsNeeded!==null && r.monthsNeeded<=6 
  ? `<button onclick="notify('${r.destination}', ${r.monthsNeeded})">
       🔔 Avvisami
     </button>`
  : ""}

</div>
`
})

}

render(bookable,"✈️ Ora")
render(almost,"⚖️ Presto")
render(future,"🌍 Futuro")

document.getElementById("results").innerHTML=html

})

}

</script>

</body>
</html>
