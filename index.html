<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Voli Reward Reali</title>

<style>
body{font-family:sans-serif;background:#f8fafc;text-align:center}
.container{max-width:700px;margin:40px auto}
.card{background:white;padding:20px;margin:15px;border-radius:10px;text-align:left}
.highlight{border:2px solid green}
</style>

</head>

<body>

<div class="container">

<h1>✈️ Trova voli premio REALI</h1>

<select id="from">
<option value="MXP">Milano</option>
<option value="FCO">Roma</option>
</select>

<select id="dest">
<option value="MAD">Madrid</option>
<option value="LHR">Londra</option>
</select>

<br><br>

<button onclick="search()">Cerca</button>

<div id="results"></div>

</div>

<script>

function search(){

const from=document.getElementById("from").value
const dest=document.getElementById("dest").value

fetch(`/api/avios-search?from=${from}&dest=${dest}`)
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach(f=>{

html+=`
<div class="card highlight">

<b>${f.from} → ${f.dest}</b><br><br>

💳 ${f.points} punti Avios<br>
💸 Tasse: €${f.taxes}<br>
💰 Cash stimato: €${f.cash}<br><br>

📊 Valore: ${f.value} cent/punto<br><br>

${f.value >= 1 ? "🔥 Buona opportunità" : ""}

</div>
`

})

document.getElementById("results").innerHTML=html

})

}

</script>

</body>
</html>
