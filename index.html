<script>

function getValueLabel(value){

value=parseFloat(value)

if(value>=2) return "🔥 Ottima redemption"
if(value>=1) return "👍 Buona redemption"
if(value>=0.5) return "⚖️ Valore base"
return "⚠️ Valore basso"

}

function getValueHint(value){

value=parseFloat(value)

if(value<1){
return "💡 Alcuni voli Business possono superare 2-3 cent/punto"
}

return ""

}

function searchFlights(){

const from=document.getElementById("from").value
const cabin=document.getElementById("cabin").value
const maxPoints=document.getElementById("maxPoints").value
const monthlyMR=parseInt(document.getElementById("monthlyMR").value)
const date=document.getElementById("date").value

fetch(`/api/search?from=${from}&maxMR=${maxPoints}&cabin=${cabin}&date=${date}&monthlyMR=${monthlyMR}`)

.then(res=>res.json())

.then(data=>{

let {bookable,almost,future}=data.sections

let all=[...bookable,...almost,...future]

const bestValue=Math.max(...all.map(r=>parseFloat(r.estimatedValue||0)))

all.forEach(r=>{
r.valuePercent=Math.round((parseFloat(r.estimatedValue)/bestValue)*100)
})

let html=""

function render(list,title){

if(!list.length) return

html+=`<h2>${title}</h2>`

list.forEach(r=>{

const saving=r.cashAverage
? (parseFloat(r.cashAverage)-r.taxes).toFixed(0)
: 0

let monthsText=""

if(r.monthsNeeded !== null){
monthsText=`📅 Circa <b>${r.monthsNeeded} mesi</b> per accumulare i punti mancanti<br>`
}

html+=`

<div class="card">

<b>${r.destination}</b> (${r.region})<br>

✈️ Partenza: ${r.from}<br>
💺 ${r.cabin}<br><br>

💳 ${r.mrRequired.toLocaleString()} MR<br>

💰 ${r.cashAverage ? `€${r.cashAverage}` : "Prezzo non disponibile"}<br>

💸 Risparmio: €${saving}<br><br>

📊 ${r.estimatedValue} cent/punto<br>
${getValueLabel(r.estimatedValue)}<br>
${getValueHint(r.estimatedValue)}<br><br>

📊 ${r.valuePercent}% del valore massimo

<div class="value-bar-container">
<div class="value-bar" style="width:${r.valuePercent}%"></div>
</div>

${r.mrMissing>0 
  ? `⚠️ Ti mancano ${r.mrMissing.toLocaleString()} MR<br>` 
  : "✈️ Prenotabile Ora<br>"}

${monthsText}

</div>

`

})

}

render(bookable,"✈️ Prenotabili ora")
render(almost,"⚖️ Raggiungibili a breve")
render(future,"🌍 Obiettivi futuri")

document.getElementById("results").innerHTML=html

})

.catch(()=>{

document.getElementById("results").innerHTML="<h2>Errore nella ricerca</h2>"

})

}

</script>
