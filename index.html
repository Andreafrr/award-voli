<script>

function searchFlights(){

const from=document.getElementById("from").value
const maxPoints=document.getElementById("maxPoints").value
const monthlyMR=parseInt(document.getElementById("monthlyMR").value)
const date=document.getElementById("date").value

fetch(`/api/search?from=${from}&maxMR=${maxPoints}&date=${date}`)

.then(res=>res.json())

.then(data=>{

let {bookable,almost,future}=data.sections

let html=""

function render(list,title){

if(!list.length) return

html+=`<h2>${title}</h2>`

list.forEach(r=>{

let upgradeHTML=""

if(r.upgrade){

let months=""

if(monthlyMR && r.upgrade.mrMissing>0){

const m=Math.ceil(r.upgrade.mrMissing/monthlyMR)
months=`📅 +${m} mesi`
}

upgradeHTML=`

<div style="margin-top:10px;padding:10px;background:#f1f5f9;border-radius:8px;">

💡 <b>Upgrade possibile</b><br>

${r.upgrade.destination} (${r.upgrade.cabin})<br>

📊 ${r.upgrade.value} cent/punto<br>

🚀 +${r.upgrade.valueGain}% valore<br>

${months}

</div>

`

}

html+=`

<div class="card">

<b>${r.destination}</b> (${r.region})<br>

✈️ ${r.from}<br>
💺 ${r.cabin}<br><br>

💳 ${r.mrRequired} MR<br>

💰 ${r.cashAverage==="N/A"?"N/D":`€${r.cashAverage}`}<br><br>

📊 ${r.estimatedValue} cent/punto<br>

📊 ${r.valuePercent}% del valore massimo<br>

${r.mrMissing>0?`⚠️ Mancano ${r.mrMissing} MR<br>`:"✅ Prenotabile ora<br>"}

${upgradeHTML}

</div>

`

})

}

render(bookable,"✈️ Prenotabili ora")
render(almost,"⚖️ Quasi raggiungibili")
render(future,"🌍 Obiettivi futuri")

document.getElementById("results").innerHTML=html

})

}

</script>
