<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparatore Voli Premio</title>

<style>
body{font-family:sans-serif;background:#f8fafc;text-align:center}
.container{max-width:800px;margin:40px auto}
.card{background:white;padding:20px;margin:15px;border-radius:10px;text-align:left}
.highlight{border:2px solid gold}
.value-bar{height:6px;background:#4f46e5}
.value-bar-container{background:#ddd;height:6px}
</style>

</head>

<body>

<div class="container">

<h1>🎯 Scopri dove i tuoi punti valgono di più</h1>

<select id="from">
<option value="IT">Italia</option>
<option value="MXP">Milano</option>
<option value="FCO">Roma</option>
<option value="VCE">Venezia</option>
<option value="BLQ">Bologna</option>
<option value="NAP">Napoli</option>
</select>

<select id="cabin">
<option value="all">Tutte le cabine</option>
<option value="Economy">Economy</option>
<option value="Premium Economy">Premium Economy</option>
<option value="Business">Business</option>
<option value="First">First</option>
</select>

<br>

<input id="maxPoints" placeholder="MR">
<input id="monthlyMR" placeholder="MR/mese">

<br>

<button onclick="searchFlights()">Cerca</button>

<div id="timeline"></div>
<div id="bestRealistic"></div>
<div id="results"></div>

</div>

<script>

function searchFlights(){

const from=document.getElementById("from").value
const cabin=document.getElementById("cabin").value
const maxPoints=document.getElementById("maxPoints").value
const monthlyMR=document.getElementById("monthlyMR").value

fetch(`/api/search?from=${from}&maxMR=${maxPoints}&cabin=${cabin}&monthlyMR=${monthlyMR}`)

.then(res=>res.json())
.then(data=>{

let {bookable,almost,future}=data.sections
let all=[...bookable,...almost,...future]

// timeline
const timeline=all
.filter(r=>r.monthsNeeded!==null)
.sort((a,b)=>a.monthsNeeded-b.monthsNeeded)
.slice(0,5)

let t="<div><b>Piano viaggio</b><br><br>"
timeline.forEach(r=>{
t+=`${r.destination} → ${r.monthsNeeded} mesi<br>`
})
t+="</div>"
document.getElementById("timeline").innerHTML=t

// best
const best=all
.filter(r=>r.monthsNeeded!==null && r.monthsNeeded<=6)
.sort((a,b)=>b.estimatedValue-a.estimatedValue)[0]

if(best){
document.getElementById("bestRealistic").innerHTML=`
<div class="card highlight">
🎯 ${best.destination}<br>
📅 ${best.monthsNeeded} mesi<br>
🌤 ${best.bestMonth}
</div>`
}

// render
let html=""

function render(list,title){

html+=`<h2>${title}</h2>`

list.forEach(r=>{

html+=`
<div class="card">
<b>${r.destination}</b><br>
💺 ${r.cabin}<br>
📊 ${r.estimatedValue}<br>
🌤 ${r.bestMonth}<br>
${r.monthsNeeded?`📅 ${r.monthsNeeded} mesi`:""}
</div>
`
})

}

render(bookable,"Ora")
render(almost,"Presto")
render(future,"Futuro")

document.getElementById("results").innerHTML=html

})

}

</script>

</body>
</html>
