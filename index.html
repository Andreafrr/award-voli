<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparatore Voli Premio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
margin:0;
padding:0;
text-align:center;
}

.container{
margin-top:60px;
background:white;
padding:30px;
border-radius:16px;
width:90%;
max-width:700px;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

input,select{
padding:12px;
margin:8px;
width:220px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 24px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
background:white;
margin:20px auto;
padding:22px;
max-width:500px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h1>🎯 Scopri dove i tuoi punti valgono di più</h1>

<select id="from">
<option value="MXP">Milano (MXP)</option>
<option value="FCO">Roma (FCO)</option>
</select>

<select id="cabin">
<option value="all">Tutte le cabine</option>
<option value="Economy">Solo Economy</option>
<option value="Business">Solo Business</option>
</select>

<input id="maxPoints" placeholder="MR disponibili (es. 40000)">

<br>

<button onclick="searchFlights()">Dove posso andare?</button>

<div id="results"></div>

</div>

<script>

function searchFlights(){

const from=document.getElementById("from").value;
const cabin=document.getElementById("cabin").value;
const maxPoints=document.getElementById("maxPoints").value;

if(!maxPoints){
alert("Inserisci i Membership Rewards disponibili");
return;
}

fetch(`/api/search?from=${from}&maxMR=${maxPoints}`)
.then(res=>res.json())
.then(data=>{

const resultsDiv=document.getElementById("results");

let all=[
...(data.sections.bookable||[]),
...(data.sections.almost||[]),
...(data.sections.future||[])
];

if(cabin!=="all"){
all=all.filter(r=>r.cabin===cabin);
}

if(all.length===0){
resultsDiv.innerHTML="<h2>Nessun risultato</h2>";
return;
}

let html="";

all.forEach(r=>{

const avgCash=(parseFloat(r.cashMin)+parseFloat(r.cashMax))/2;
const saving=avgCash-parseFloat(r.taxes);

const value=parseFloat(r.estimatedValue);

let rating="";

if(value>=3)
rating="🔥 Redemption eccellente";
else if(value>=2)
rating="⭐ Ottima redemption";
else if(value>=1)
rating="👍 Buona redemption";
else
rating="⚠️ Valore debole";

html+=`

<div class="card">

<b>${r.destination}</b> (${r.region})<br><br>

💺 Cabina: <b>${r.cabin}</b><br>

💳 Programma: <b>${r.program}</b><br>

✈️ ${r.points.toLocaleString()} punti compagnia<br>

💳 ${r.mrRequired.toLocaleString()} MR richiesti<br><br>

💰 Prezzo medio cash: €${r.cashMin} - €${r.cashMax}<br>

💸 Risparmio stimato: €${saving.toFixed(0)}<br><br>

📊 Valore punti: <b>${r.estimatedValue}</b> cent/punto<br>

${rating}<br><br>

🔥 Opportunity Score: ${r.opportunityScore}/100

</div>

`;

});

resultsDiv.innerHTML=html;

})

.catch(()=>{
document.getElementById("results").innerHTML="<h2>Errore nella ricerca</h2>";
});

}

</script>

</body>

</html>
