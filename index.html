<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparatore Voli Premio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
margin:0;
padding:0;
text-align:center;
}

.container{
margin-top:60px;
background:white;
padding:30px;
border-radius:16px;
width:90%;
max-width:700px;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

input,select{
padding:12px;
margin:8px;
width:220px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 24px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
margin:20px auto;
padding:22px;
max-width:500px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
text-align:left;
}

.highlight{
border:2px solid gold;
}

.section-title{
margin-top:40px;
font-size:20px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<h1>🎯 Scopri dove i tuoi punti valgono di più</h1>

<select id="from">
<option value="MXP">Milano (MXP)</option>
<option value="FCO">Roma (FCO)</option>
</select>

<select id="cabin">
<option value="all">Tutte le cabine</option>
<option value="Economy">Economy</option>
<option value="Premium Economy">Premium Economy</option>
<option value="Business">Business</option>
<option value="First">First</option>
</select>

<input id="maxPoints" placeholder="MR disponibili (es. 40000)">

<br>

<button onclick="searchFlights()">Dove posso andare?</button>

<div id="possibleFlights"></div>
<div id="sweetSpots"></div>
<div id="bestAbsolute"></div>
<div id="bestToday"></div>
<div id="results"></div>

</div>

<script>

function searchFlights(){

const from=document.getElementById("from").value
const cabin=document.getElementById("cabin").value
const maxPoints=document.getElementById("maxPoints").value

fetch(`/api/search?from=${from}&maxMR=${maxPoints}`)
.then(res=>res.json())
.then(data=>{

const resultsDiv=document.getElementById("results")
const bestAbsoluteDiv=document.getElementById("bestAbsolute")
const bestTodayDiv=document.getElementById("bestToday")
const sweetSpotsDiv=document.getElementById("sweetSpots")
const possibleDiv=document.getElementById("possibleFlights")

let {bookable,almost,future}=data.sections

let all=[...bookable,...almost,...future]

const possible=data.possibleDestinations

if(possible&&possible.length>0){

let html=`<div class="card highlight">

✈️ <b>Con i tuoi punti puoi volare qui</b><br><br>
`

possible.slice(0,6).forEach(p=>{

html+=`

${p.destination} (${p.region}) — ${p.cabin}<br>
💳 ${p.mrRequired.toLocaleString()} MR<br><br>

`

})

html+=`</div>`

possibleDiv.innerHTML=html

}

const sweetSpots=data.sweetSpots

if(sweetSpots&&sweetSpots.length>0){

let html=`<div class="card highlight">

🔥 <b>Sweet Spots</b><br><br>
`

sweetSpots.forEach(s=>{

html+=`

${s.destination} (${s.region}) — ${s.cabin}<br>
📊 ${s.estimatedValue} cent/punto<br><br>

`

})

html+=`</div>`

sweetSpotsDiv.innerHTML=html

}

let bestValue=all.find(r=>r.isBestValue)

if(bestValue){

bestAbsoluteDiv.innerHTML=`

<div class="card highlight">

🏆 <b>Miglior valore assoluto</b><br><br>

${bestValue.destination} (${bestValue.region})<br>

💺 ${bestValue.cabin}<br>

📊 ${bestValue.estimatedValue} cent/punto

</div>

`

}

const bestToday=data.bestRedemptionToday

if(bestToday){

bestTodayDiv.innerHTML=`

<div class="card highlight">

🔥 <b>Best Redemption Today</b><br><br>

${bestToday.destination} (${bestToday.region})<br>

💺 ${bestToday.cabin}<br>

📊 ${bestToday.estimatedValue} cent/punto

</div>

`

}

let html=""

function renderSection(title,list){

if(!list||list.length===0) return

html+=`<div class="section-title">${title}</div>`

list.forEach(r=>{

html+=`

<div class="card">

<b>${r.destination}</b> (${r.region})<br><br>

💺 Cabina: <b>${r.cabin}</b><br>

💳 Programma: <b>${r.program}</b><br>

✈️ ${r.points.toLocaleString()} punti compagnia<br>

💳 ${r.mrRequired.toLocaleString()} MR richiesti<br><br>

📊 Valore punti: ${r.estimatedValue} cent/punto<br>

🔥 Opportunity Score: ${r.opportunityScore}/100

</div>

`

})

}

renderSection("✈️ Prenotabili Ora",bookable)
renderSection("⚖️ Quasi Raggiungibili",almost)
renderSection("🌍 Obiettivi Futuri",future)

resultsDiv.innerHTML=html

})

}

</script>

</body>
</html>
