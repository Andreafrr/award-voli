<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparatore Voli Premio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
margin:0;
padding:0;
text-align:center;
}

.container{
margin-top:60px;
background:white;
padding:30px;
border-radius:16px;
width:90%;
max-width:700px;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
font-size:28px;
font-weight:700;
}

input,select{
padding:12px;
margin:8px;
width:220px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 24px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
margin:20px auto;
padding:22px;
max-width:500px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
text-align:left;
}

.highlight{
border:2px solid gold;
}

.section-title{
margin-top:40px;
font-size:20px;
font-weight:600;
}

/* barra valore */

.value-bar-container{
margin-top:8px;
background:#e5e7eb;
border-radius:6px;
height:8px;
width:100%;
overflow:hidden;
}

.value-bar{
height:8px;
background:#4f46e5;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎯 Scopri dove i tuoi punti valgono di più</h1>

<select id="from">
<option value="MXP">Milano (MXP)</option>
<option value="FCO">Roma (FCO)</option>
</select>

<select id="cabin">
<option value="all">Tutte le cabine</option>
<option value="Economy">Economy</option>
<option value="Premium Economy">Premium Economy</option>
<option value="Business">Business</option>
<option value="First">First</option>
</select>

<input id="maxPoints" placeholder="MR disponibili (es. 40000)">

<br>

<button onclick="searchFlights()">Dove posso andare?</button>

<div id="bestAbsolute"></div>
<div id="bestDeal"></div>
<div id="results"></div>

</div>

<script>

function searchFlights(){

const from=document.getElementById("from").value;
const cabin=document.getElementById("cabin").value;
const maxPoints=document.getElementById("maxPoints").value;

if(!maxPoints){
alert("Inserisci i Membership Rewards disponibili");
return;
}

fetch(`/api/search?from=${from}&maxMR=${maxPoints}`)
.then(res=>res.json())
.then(data=>{

const resultsDiv=document.getElementById("results");
const bestDiv=document.getElementById("bestDeal");
const bestAbsoluteDiv=document.getElementById("bestAbsolute");

if(!data.sections){
resultsDiv.innerHTML="<h2>Nessuna destinazione trovata</h2>";
return;
}

let {bookable,almost,future}=data.sections;

let all=[...bookable,...almost,...future];

if(cabin!=="all"){
bookable=bookable.filter(r=>r.cabin===cabin);
almost=almost.filter(r=>r.cabin===cabin);
future=future.filter(r=>r.cabin===cabin);
all=all.filter(r=>r.cabin===cabin);
}

/* miglior valore assoluto */

let bestValue=all.find(r=>r.isBestValue);

if(bestValue){

bestAbsoluteDiv.innerHTML=`

<div class="card highlight">

🏆 <b>Miglior valore assoluto</b><br><br>

${bestValue.destination} (${bestValue.region})<br>

💺 ${bestValue.cabin}<br>

📊 Valore punti: ${bestValue.estimatedValue} cent/punto<br>

📈 Massimizzi il <b>${bestValue.valuePercent}%</b> del valore possibile

<div class="value-bar-container">
<div class="value-bar" style="width:${bestValue.valuePercent}%"></div>
</div>

💳 Richiede ${bestValue.mrRequired.toLocaleString()} MR

</div>

`;

}

/* miglior prenotabile ora */

let bestNow=bookable[0];

if(bestNow){

bestDiv.innerHTML=`

<div class="card highlight">

🔥 <b>Miglior opportunità prenotabile ora</b><br><br>

${bestNow.destination} (${bestNow.region})<br>

💺 ${bestNow.cabin}<br>

🔥 Opportunity Score: ${bestNow.opportunityScore}/100<br>

📊 Massimizzi circa il <b>${bestNow.valuePercent}%</b> del valore possibile

<div class="value-bar-container">
<div class="value-bar" style="width:${bestNow.valuePercent}%"></div>
</div>

</div>

`;

}

let html="";

function renderSection(title,list){

if(!list||list.length===0) return;

html+=`<div class="section-title">${title}</div>`;

list.forEach(r=>{

const avgCash=(parseFloat(r.cashMin)+parseFloat(r.cashMax))/2;
const saving=avgCash-parseFloat(r.taxes);

const value=parseFloat(r.estimatedValue);

let rating="";

if(value>=3)
rating="🔥 Redemption eccellente";
else if(value>=2)
rating="⭐ Ottima redemption";
else if(value>=1)
rating="👍 Buona redemption";
else
rating="⚠️ Valore debole";

html+=`

<div class="card">

<b>${r.destination}</b> (${r.region})<br><br>

💺 Cabina: <b>${r.cabin}</b><br>

💳 Programma: <b>${r.program}</b><br>

✈️ ${r.points.toLocaleString()} punti compagnia<br>

💳 ${r.mrRequired.toLocaleString()} MR richiesti<br><br>

💰 Prezzo medio cash: €${r.cashMin} - €${r.cashMax}<br>

💸 Risparmio stimato: €${saving.toFixed(0)}<br><br>

📊 Valore punti: ${r.estimatedValue} cent/punto<br>

${rating}<br>

📊 Massimizzi circa il <b>${r.valuePercent}%</b> del valore massimo

<div class="value-bar-container">
<div class="value-bar" style="width:${r.valuePercent}%"></div>
</div>

🔥 Opportunity Score: ${r.opportunityScore}/100<br>

${r.isBestValue?"🏆 <b>Valore più alto tra le opzioni</b><br>":""}

${r.relativeLoss>0?`💸 Rinunci a circa <b>€${r.relativeLoss}</b> rispetto alla miglior alternativa<br>`:""}

${r.mrMissing>0?`⚠️ Ti mancano ${r.mrMissing.toLocaleString()} MR<br>`:"✈️ Prenotabile Ora<br>"}

</div>

`;

});

}

renderSection("✈️ Prenotabili Ora",bookable);
renderSection("⚖️ Quasi Raggiungibili",almost);
renderSection("🌍 Obiettivi Futuri",future);

resultsDiv.innerHTML=html;

})

.catch(()=>{

document.getElementById("results").innerHTML="<h2>Errore nella ricerca</h2>";

});

}

</script>

</body>

</html>
